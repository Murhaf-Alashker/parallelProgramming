services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: laravel_app
        volumes:
            - .:/var/www/html
        working_dir: /var/www/html
        extra_hosts:
            - "host.docker.internal:host-gateway"

    app2:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: laravel_app_2
        volumes:
            - .:/var/www/html
        working_dir: /var/www/html
        extra_hosts:
            - "host.docker.internal:host-gateway"

    app3:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: laravel_app_3
        volumes:
            - .:/var/www/html
        working_dir: /var/www/html
        extra_hosts:
            - "host.docker.internal:host-gateway"

    nginx:
        image: nginx:alpine
        container_name: laravel_nginx
        ports:
            - "8080:80"
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
            - app2
            - app3
